<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTurk Pro Tracker</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .hit-card { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MTurk Pro Tracker</h1>
        <div id="status">Connecting...</div>
        <div id="hits"></div>
    </div>

    <script>
        const socket = io("https://mturk-live-tracker.onrender.com");
        
        socket.on('connect', () => {
            document.getElementById('status').innerText = "Status: Connected - Waiting for data...";
        });

        socket.on('dashboard-update', (data) => {
            document.getElementById('status').innerText = "Status: Receiving Data";
            const container = document.getElementById('hits');
            container.innerHTML = data.liveHits.map(h => `
                <div class="hit-card">
                    <strong>${h.title}</strong><br>
                    Reward: ${h.reward}
                </div>
            `).join('');
        });
    </script>
</body>
</html>
