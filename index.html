<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTurk HIT Tracker // LIVE</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111622; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; border-bottom: 2px solid #00a8ff; }
        .logo { font-size: 22px; font-weight: bold; color: #00a8ff; }
        .badge { background: #00b894; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select, .btn { background: #111622; color: #fff; border: 1px solid #222f3e; padding: 8px 15px; border-radius: 6px; font-size: 13px; outline: none; }
        .btn-reset { background: #ea2027; border: none; color: white; font-weight: bold; margin-left: auto; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #111622; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #222f3e; }
        .stat-card h3 { font-size: 11px; color: #8a99ad; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card p { font-size: 24px; font-weight: bold; color: #fff; }
        .table-container { background: #111622; border-radius: 8px; overflow: hidden; border: 1px solid #222f3e; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a233a; color: #8a99ad; padding: 12px 15px; font-size: 12px; text-transform: uppercase; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #1e272e; font-size: 13px; }
        tr:hover { background: #161f33; }
        .no-data { padding: 40px; text-align: center; color: #576574; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">MTURK PRO // <span class="badge">• CLOUD LIVE</span></div>
        <div id="sync-time" style="color: #8a99ad; font-size: 13px;">Last Cloud Sync: --:--:--</div>
    </div>

    <div class="filter-section">
        <select id="filter-team" onchange="applyFilters()"><option value="all">All Teams (গুগল শিট)</option></select>
        <select id="filter-worker" onchange="applyFilters()"><option value="all">All Workers</option></select>
        <button class="btn btn-reset" onclick="resetData()">Reset Database</button>
    </div>

    <!-- Stats Boxes -->
    <div class="stats-grid">
        <div class="stat-card"><h3>Active Now</h3><p id="box-active" style="color: #2ecc71;">0</p></div>
        <div class="stat-card"><h3>Total Selected Hits</h3><p id="box-total">0</p></div>
        <div class="stat-card"><h3>Estimated Earned</h3><p id="box-earned" style="color: #f1c40f;">$0.00</p></div>
        <div class="stat-card"><h3>Active Workers</h3><p id="box-workers" style="color: #9b59b6;">0</p></div>
        <div class="stat-card"><h3>Active Teams</h3><p id="box-teams" style="color: #3498db;">0</p></div>
        <div class="stat-card"><h3>Submitted</h3><p id="box-submitted" style="color: #e67e22;">0</p></div>
        <div class="stat-card"><h3>Returned</h3><p id="box-returned" style="color: #e74c3c;">0</p></div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Worker Name (ID)</th>
                    <th>Requester</th>
                    <th>HIT Title</th>
                    <th>Reward</th>
                    <th>Time Left</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="7" class="no-data">Waiting for real-time cloud streams...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = io("https://mturk-live-tracker.onrender.com");
        let localHitsData = [];

        socket.on('dashboard-update', (data) => {
            document.getElementById('sync-time').innerText = "Last Cloud Sync: " + new Date().toLocaleTimeString();
            localHitsData = data.liveHits || [];
            
            // সার্ভার থেকে আসা গ্লোবাল লাইফটাইম স্ট্যাটাস আপডেট
            if(data.stats) {
                document.getElementById('box-total').innerText = data.stats.totalSelected;
                document.getElementById('box-earned').innerText = "$" + data.stats.estimatedEarned.toFixed(2);
                document.getElementById('box-submitted').innerText = data.stats.submittedCount;
                document.getElementById('box-returned').innerText = data.stats.returnedCount;
            }

            updateFilterOptions(localHitsData);
            applyFilters();
        });

        function updateFilterOptions(hits) {
            const teamSelect = document.getElementById('filter-team');
            const workerSelect = document.getElementById('filter-worker');
            const currentTeam = teamSelect.value;
            const currentWorker = workerSelect.value;

            let teams = new Set(['all']);
            let workers = new Set(['all']);

            hits.forEach(hit => {
                if(hit.team && hit.team !== 'Unknown') teams.add(hit.team);
                if(hit.username) workers.add(hit.username);
            });

            teamSelect.innerHTML = Array.from(teams).map(t => `<option value="${t}">${t === 'all' ? 'All Teams (গুগল শিট)' : t}</option>`).join('');
            teamSelect.value = teams.has(currentTeam) ? currentTeam : 'all';

            workerSelect.innerHTML = Array.from(workers).map(w => `<option value="${w}">${w === 'all' ? 'All Workers' : w}</option>`).join('');
            workerSelect.value = workers.has(currentWorker) ? currentWorker : 'all';
        }

        function applyFilters() {
            const selectedTeam = document.getElementById('filter-team').value;
            const selectedWorker = document.getElementById('filter-worker').value;

            const filteredHits = localHitsData.filter(hit => {
                const matchTeam = selectedTeam === 'all' || hit.team === selectedTeam;
                const matchWorker = selectedWorker === 'all' || hit.username === selectedWorker;
                return matchTeam && matchWorker;
            });

            renderTable(filteredHits);
        }

        function renderTable(hits) {
            const tbody = document.getElementById('table-body');
            
            // একটিভ বক্স ও ইউনিক আইডি গণনা (শুধুমাত্র টেবিলে থাকা লাইভ ডাটা থেকে)
            let uniqueWorkers = new Set();
            let uniqueTeams = new Set();

            localHitsData.forEach(hit => {
                if(hit.workerId) uniqueWorkers.add(hit.workerId);
                if(hit.team && hit.team !== 'Unknown') uniqueTeams.add(hit.team);
            });

            document.getElementById('box-active').innerText = localHitsData.length;
            document.getElementById('box-workers').innerText = uniqueWorkers.size;
            document.getElementById('box-teams').innerText = uniqueTeams.size;

            if (hits.length > 0) {
                tbody.innerHTML = hits.map(hit => `
                    <tr>
                        <td style="color: #00a8ff; font-weight: 600;">${hit.team}</td>
                        <td>${hit.username} <span style="color: #576574; font-size: 11px;">(${hit.workerId})</span></td>
                        <td>${hit.requester}</td>
                        <td>${hit.title}</td>
                        <td style="color: #2ecc71; font-weight: bold;">${hit.reward}</td>
                        <td>${hit.timeLeft}</td>
                        <td><span class="badge" style="background: #2ecc71">${hit.status}</span></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = `<tr><td colspan="7" class="no-data">No active hits right now.</td></tr>`;
            }
        }

        function resetData() {
            if(confirm("Are you sure you want to reset the dashboard?")) {
                fetch("https://mturk-live-tracker.onrender.com/api/reset", { method: "POST" });
            }
        }
    </script>
</body>
</html>
