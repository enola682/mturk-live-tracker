<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTURK PRO // LIVE</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #080b11; color: #94a3b8; padding: 15px; }
        
        .top-navbar { display: flex; justify-content: space-between; align-items: center; background: #0f141c; padding: 12px 20px; border-radius: 6px; margin-bottom: 15px; border-bottom: 2px solid #00b894; }
        .logo-area { font-size: 18px; font-weight: bold; color: #3b82f6; }
        .sync-msg { color: #64748b; font-size: 12px; font-family: monospace; }

        .controls-row { display: flex; gap: 10px; background: #0f141c; padding: 12px; border-radius: 6px; margin-bottom: 15px; align-items: center; }
        select { background: #151b26; border: 1px solid #1e293b; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; outline: none; cursor: pointer; }
        .right-buttons { margin-left: auto; }
        .btn-reset { background: #dc2626; color: #fff; border: none; padding: 6px 15px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .stat-box { background: #0f141c; padding: 15px; border-radius: 6px; border: 1px solid #131924; text-align: center; }
        .stat-box span { font-size: 10px; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 6px; }
        .stat-box h2 { font-size: 22px; color: #fff; font-weight: 700; }

        .table-container { background: #0f141c; border-radius: 6px; border: 1px solid #131924; overflow: hidden; }
        .table-area { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #131924; color: #475569; padding: 12px 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #131924; font-size: 12px; color: #cbd5e1; }
        tr:hover { background: #151b26; }
        
        .status-badge { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .st-active { background: rgba(0, 184, 148, 0.15); color: #00b894; border: 1px solid #00b894; }
        .st-expired { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="logo-area">MTURK PRO // <span style="color:#00b894;">• CLOUD LIVE</span></div>
        <div id="sync-clock" class="sync-msg">Last Cloud Sync: --:--:--</div>
    </div>

    <div class="controls-row">
        <select id="filter-team" onchange="applyFilters()"><option value="all">All Teams</option></select>
        <select id="filter-status" onchange="applyFilters()">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
        </select>
        <div class="right-buttons">
            <button class="btn-reset" onclick="triggerReset()">Reset Database</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><span>Active Now</span><h2 id="s-active">0</h2></div>
        <div class="stat-box"><span>Total Selected Hits</span><h2 id="s-total">0</h2></div>
        <div class="stat-box"><span>Estimated Earned</span><h2 id="s-earned">$0.00</h2></div>
        <div class="stat-box"><span>Expired Tasks</span><h2 id="s-expired">0</h2></div>
    </div>

    <div class="table-container">
        <table class="table-area">
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Worker Name (ID)</th>
                    <th>Requester</th>
                    <th>Hit Title</th>
                    <th>Reward</th>
                    <th>Time Left</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align:center; padding:30px;">Waiting for cloud data streams...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = io("/", { transports: ["websocket", "polling"] });
        let streamData = [];

        socket.on('dashboard-update', (data) => {
            document.getElementById('sync-clock').innerText = "Last Cloud Sync: " + new Date().toLocaleTimeString();
            streamData = data.liveHits || [];
            repopulateFilters();
            applyFilters();
        });

        function repopulateFilters() {
            const tSel = document.getElementById('filter-team');
            const tVal = tSel.value;
            let teams = new Set(['all']);
            streamData.forEach(h => { if(h.team) teams.add(h.team); });
            tSel.innerHTML = Array.from(teams).map(t => `<option value="${t}">${t==='all'?'All Teams':t}</option>`).join('');
            tSel.value = teams.has(tVal) ? tVal : 'all';
        }

        function applyFilters() {
            const team = document.getElementById('filter-team').value;
            const status = document.getElementById('filter-status').value;

            const filtered = streamData.filter(h => {
                if (team !== 'all' && h.team !== team) return false;
                if (status !== 'all' && h.status.toLowerCase() !== status) return false;
                return true;
            });

            // স্ট্যাটাস ক্যালকুলেশন
            let active = 0, exp = 0, earned = 0;
            filtered.forEach(h => {
                if(h.status.toLowerCase() === 'active') active++;
                else exp++;
                earned += parseFloat(h.reward.replace('$', '')) || 0;
            });

            document.getElementById('s-active').innerText = active;
            document.getElementById('s-total').innerText = filtered.length;
            document.getElementById('s-earned').innerText = "$" + earned.toFixed(2);
            document.getElementById('s-expired').innerText = exp;

            // টেবিল রেন্ডার
            const tbody = document.getElementById('table-body');
            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">No records found.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(h => {
                const isExp = h.status.toLowerCase() === 'expired' || h.timeLeft === '0:00';
                return `
                    <tr>
                        <td style="color:#3b82f6; font-weight:bold;">${h.team}</td>
                        <td style="font-family:monospace;">${h.workerId}</td>
                        <td>${h.requester}</td>
                        <td>${h.title}</td>
                        <td style="color:#00b894; font-weight:bold;">${h.reward}</td>
                        <td style="${isExp ? 'color:#ef4444; font-weight:bold;' : ''}">${isExp ? '0:00' : h.timeLeft}</td>
                        <td><span class="status-badge ${isExp ? 'st-expired' : 'st-active'}">${isExp ? 'EXPIRED' : 'ACTIVE'}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function triggerReset() {
            if(confirm("Confirm reset dashboard database?")) {
                fetch("/api/reset", { method: "POST" });
            }
        }
    </script>
</body>
</html>
