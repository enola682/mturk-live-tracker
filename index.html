<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTurk HIT Tracker // LIVE</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #06090e; color: #8b949e; padding: 15px; }
        
        .top-navbar { display: flex; justify-content: space-between; align-items: center; background: #0c1017; padding: 14px 20px; border-radius: 4px; margin-bottom: 15px; border-bottom: 1px solid #161b22; }
        .logo-area { font-size: 15px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 8px; font-family: monospace; }
        .logo-area span.green-tag { color: #58a6ff; font-size: 11px; background: rgba(56, 139, 253, 0.15); padding: 2px 6px; border-radius: 3px; }
        .sync-msg { color: #c9d1d9; font-size: 13px; font-family: monospace; font-weight: bold; }

        .controls-row { display: flex; gap: 10px; background: #0c1017; padding: 12px 20px; border-radius: 4px; margin-bottom: 15px; align-items: center; border: 1px solid #161b22; }
        select { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 12px; border-radius: 4px; font-size: 12px; outline: none; cursor: pointer; }
        .btn-reset { background: #da3633; color: #fff; border: none; padding: 7px 14px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; margin-left: auto; }
        .btn-reset:hover { background: #f85149; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #0c1017; padding: 16px; border-radius: 4px; text-align: left; border: 1px solid #161b22; border-bottom: 3px solid #30363d; }
        .stat-box.active-box { border-bottom-color: #2ea043; }
        .stat-box.total-box { border-bottom-color: #1f6feb; }
        .stat-box.earned-box { border-bottom-color: #d29922; }
        .stat-box span { font-size: 10px; text-transform: uppercase; color: #52627a; font-weight: bold; display: block; margin-bottom: 6px; }
        .stat-box h2 { font-size: 24px; color: #f0f6fc; font-weight: 700; font-family: monospace; }

        .table-container { background: #0c1017; border-radius: 4px; border: 1px solid #161b22; overflow-x: auto; }
        .table-area { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
        th { background: #161b22; color: #8b949e; padding: 12px 16px; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #30363d; }
        td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 13px; color: #c9d1d9; }
        tr:hover { background: #161b22; }
        
        .status-badge { font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; display: inline-block; text-align: center; font-family: monospace; }
        .st-active { background: rgba(46, 160, 67, 0.15); color: #2ea043; border: 1px solid #2ea043; }
        .st-submitted { background: rgba(31, 111, 235, 0.15); color: #1f6feb; border: 1px solid #1f6feb; }
        .st-expired { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        .st-return { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid #d29922; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="logo-area">MTurk HIT Tracker // <span class="green-tag">● CLOUD LIVE</span></div>
        <div id="sync-clock" class="sync-msg">Synced: --:--:-- PM</div>
    </div>

    <div class="controls-row">
        <select id="filter-team" onchange="applyFilters()"><option value="all">All Teams</option></select>
        <select id="filter-status" onchange="applyFilters()">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="submitted">Submitted</option>
            <option value="expired">Expired</option>
            <option value="returned">Returned</option>
        </select>
        <button class="btn-reset" onclick="triggerReset()">Reset Database</button>
    </div>

    <div class="stats-row">
        <div class="stat-box active-box"><span>Active Now</span><h2 id="s-active">0</h2></div>
        <div class="stat-box total-box"><span>Total Hits</span><h2 id="s-total">0</h2></div>
        <div class="stat-box earned-box"><span>Earned ($)</span><h2 id="s-earned">$0.00</h2></div>
        <div class="stat-box" style="border-bottom-color: #8957e5;"><span>Workers</span><h2 id="s-workers">0</h2></div>
        <div class="stat-box" style="border-bottom-color: #bc8cff;"><span>Teams</span><h2 id="s-teams">0</h2></div>
        <div class="stat-box" style="border-bottom-color: #58a6ff;"><span>Submitted</span><h2 id="s-submitted">0</h2></div>
        <div class="stat-box" style="border-bottom-color: #f85149;"><span>Returned</span><h2 id="s-expired">0</h2></div>
    </div>

    <div class="table-container">
        <table class="table-area">
            <thead>
                <tr>
                    <th>Worker ID</th>
                    <th>Username</th>
                    <th>Requester</th>
                    <th>Title</th>
                    <th>Reward</th>
                    <th>Time Left</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align:center; padding:30px; color:#52627a;">Waiting for cloud data streams...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = io("/", { transports: ["websocket", "polling"] });
        let streamData = [];

        // ১ সেকেন্ড পর পর ঘড়ি লাইভ ট্র্যাকিং আপডেট করবে
        setInterval(() => {
            const now = new Date();
            document.getElementById('sync-clock').innerText = "Synced: " + now.toLocaleTimeString();
        }, 1000);

        socket.on('dashboard-update', (data) => {
            streamData = data.liveHits || [];
            repopulateFilters();
            applyFilters();
        });

        function repopulateFilters() {
            const tSel = document.getElementById('filter-team');
            const tVal = tSel.value;
            let teams = new Set(['all']);
            streamData.forEach(h => { if(h.team && h.team !== 'Unknown') teams.add(h.team); });
            tSel.innerHTML = Array.from(teams).map(t => `<option value="${t}">${t==='all'?'All Teams':t}</option>`).join('');
            tSel.value = teams.has(tVal) ? tVal : 'all';
        }

        function applyFilters() {
            const team = document.getElementById('filter-team').value;
            const status = document.getElementById('filter-status').value;

            const filtered = streamData.filter(h => {
                if (team !== 'all' && h.team !== team) return false;
                if (status !== 'all' && h.status.toLowerCase() !== status.toLowerCase()) return false;
                return true;
            });

            let active = 0, sub = 0, exp = 0, earned = 0;
            let wSet = new Set(), tSet = new Set();

            filtered.forEach(h => {
                const s = (h.status || 'Active').toLowerCase();
                if(s === 'active') active++;
                if(s === 'submitted') sub++;
                if(s === 'expired') exp++;
                if(s === 'returned') exp++; 
                
                if(s === 'submitted') {
                    earned += parseFloat(h.reward.replace('$', '')) || 0;
                }
                if(h.username && h.username !== "N/A") wSet.add(h.username);
                if(h.team && h.team !== 'Unknown') tSet.add(h.team);
            });

            document.getElementById('s-active').innerText = active;
            document.getElementById('s-total').innerText = filtered.length;
            document.getElementById('s-earned').innerText = "$" + earned.toFixed(2);
            document.getElementById('s-workers').innerText = wSet.size;
            document.getElementById('s-teams').innerText = tSet.size;
            document.getElementById('s-submitted').innerText = sub;
            document.getElementById('s-expired').innerText = exp;

            const tbody = document.getElementById('table-body');
            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#52627a;">No records matching filter.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(h => {
                const st = (h.status || 'Active').toLowerCase();
                let classMap = 'st-active';
                if(st === 'submitted') classMap = 'st-submitted';
                else if(st === 'expired') classMap = 'st-expired';
                else if(st === 'returned') classMap = 'st-return';

                return `
                    <tr>
                        <td style="font-family:monospace; color:#8b949e;">${h.workerId}</td>
                        <td style="font-weight:600; color:#fff;">${h.username} <span style="color:#58a6ff; font-size:11px; font-weight:normal;">[${h.team}]</span></td>
                        <td style="color:#58a6ff; font-weight: 600;">${h.requester}</td>
                        <td>${h.title}</td>
                        <td style="color:#56d364; font-weight:bold; font-family:monospace;">${h.reward}</td>
                        <td style="font-family:monospace; ${(st === 'expired' || st === 'returned') ? 'color:#f85149;' : ''}">${h.timeLeft}</td>
                        <td><span class="status-badge ${classMap}">${h.status}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function triggerReset() {
            if(confirm("Are you sure you want to reset the database?")) {
                fetch("/api/reset", { method: "POST" });
            }
        }
    </script>
</body>
</html>
