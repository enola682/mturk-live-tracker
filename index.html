<!DOCTYPE html>
<html>
<head>
    <title>MTurk Pro Tracker</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div id="sync-time">Last Cloud Sync: --:--:--</div>
    <div id="hits-container">Waiting for real-time cloud streams...</div>
    <script>
        const socket = io("https://mturk-live-tracker.onrender.com");
        socket.on('dashboard-update', (data) => {
            document.getElementById('sync-time').innerText = "Last Cloud Sync: " + new Date().toLocaleTimeString();
            console.log("Data Received:", data);
        });
    </script>
</body>
</html>
