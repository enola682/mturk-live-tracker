<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTurk Live Tracker // Cloud Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111622; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; border-bottom: 3px solid #00a8ff; }
        .logo { font-size: 24px; font-weight: bold; color: #00a8ff; }
        .sync-badge { background: #00b894; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #111622; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #222f3e; }
        .stat-card h3 { font-size: 12px; color: #8a99ad; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 22px; font-weight: bold; color: #fff; }
        .stat-card p.highlight { color: #f1c40f; }
        .table-container { background: #111622; border-radius: 8px; overflow: hidden; border: 1px solid #222f3e; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1a233a; color: #8a99ad; padding: 12px 15px; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #1e272e; font-size: 14px; }
        tr:hover { background: #161f33; }
        .no-data { padding: 4px; text-align: center; color: #576574; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">MTURK PRO // <span class="sync-badge">24/7 CLOUD LIVE</span></div>
        <div id="sync-time" style="color: #8a99ad;">Last Cloud Sync: --:--:--</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Active Now</h3><p id="stat-active">0</p></div>
        <div class="stat-card"><h3>Estimated Earned</h3><p id="stat-earned" class="highlight">$0.00</p></div>
        <div class="stat-card"><h3>Total Hits</h3><p id="stat-total">0</p></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Worker Name (ID)</th>
                    <th>HIT Title</th>
                    <th>Reward</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="4" class="no-data">Waiting for real-time cloud streams...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = io("https://mturk-live-tracker.onrender.com");
        
        socket.on('connect', () => {
            console.log("Connected to permanent cloud server!");
        });

        socket.on('dashboard-update', (data) => {
            document.getElementById('sync-time').innerText = "Last Cloud Sync: " + new Date().toLocaleTimeString();
            
            const tbody = document.getElementById('table-body');
            const hits = data.liveHits || [];
            
            // স্ট্যাটাস বাটন ক্যালকুলেশন
            document.getElementById('stat-active').innerText = hits.length;
            document.getElementById('stat-total').innerText = hits.length;
            
            let totalEarned = 0;

            if (hits.length > 0) {
                tbody.innerHTML = hits.map(hit => {
                    // রিওয়ার্ড থেকে ডলার সাইন সরিয়ে হিসেব করা
                    const rewardNum = parseFloat(hit.reward.replace('$', '')) || 0;
                    totalEarned += rewardNum;

                    return `
                        <tr>
                            <td style="color: #00a8ff; font-weight: bold;">${hit.team}</td>
                            <td>${hit.username} <span style="color: #576574; font-size: 11px;">(${hit.workerId})</span></td>
                            <td>${hit.title}</td>
                            <td style="color: #2ecc71; font-weight: bold;">${hit.reward}</td>
                        </tr>
                    `;
                }).join('');
                
                document.getElementById('stat-earned').innerText = "$" + totalEarned.toFixed(2);
            } else {
                tbody.innerHTML = `<tr><td colspan="4" class="no-data">No active hits right now.</td></tr>`;
                document.getElementById('stat-earned').innerText = "$0.00";
            }
        });
    </script>
</body>
</html>
